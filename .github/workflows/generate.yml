name: Generar Portales de Cliente

on:
  schedule:
    # Ejecutar cada 6 horas (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Botón manual: permite regenerar desde GitHub en cualquier momento

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar portales desde Notion
        run: python generate.py
        env:
          NOTION_TOKEN:     ${{ secrets.NOTION_TOKEN }}
          PROCESOS_DB_ID:   ${{ secrets.PROCESOS_DB_ID }}
          HONORARIOS_DB_ID: ${{ secrets.HONORARIOS_DB_ID }}
          CLIENTES_DB_ID:   ${{ secrets.CLIENTES_DB_ID }}

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portals
          commit_message: "Portales actualizados automáticamente"
